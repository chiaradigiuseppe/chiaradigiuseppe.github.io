  opacity:0.022;
}

.cursor-ring{width:32px;height:32px;border:1.5px solid rgba(240,51,168,0.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:width 0.3s,height 0.3s,opacity 0.3s,border-color 0.3s;}

}

}

}

}

/* SECTION BASE */
section{padding:7rem 3rem;}
.s-label{

.s-title{

  z-index:0;
  pointer-events:none;
}
.pp-hero-title,.pp-desc,.pp-badge,.pp-section-label,.pp-section-title{
  position:relative;z-index:1;
}
.pp-hero-title{
  font-family:var(--font-display);font-size:clamp(4rem,10vw,9rem);
  letter-spacing:0.02em;line-height:0.88;margin-bottom:1.5rem;
}
.pp-hero-title span{
  display:block;color:transparent;
  -webkit-text-stroke:1.5px rgba(242,237,229,0.2);
}
.pp-badge{
  font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--bg);background:var(--accent);
  display:inline-block;padding:0.25rem 0.9rem;margin-bottom:1rem;
}
.pp-desc{font-size:1rem;color:var(--muted);line-height:1.8;max-width:640px;margin-bottom:4rem;border-bottom:1px solid var(--border);padding-bottom:3rem;}

.pp-section-label{
  font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--accent);margin-bottom:1.5rem;
  display:flex;align-items:center;gap:0.6rem;
}
.pp-section-label::after{content:'';flex:1;max-width:50px;height:1px;background:var(--accent);opacity:0.35;}
.pp-section-title{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.5rem);letter-spacing:0.04em;margin-bottom:2rem;}

/* VIDEO BLOCK */
.pp-video-full{width:100%;aspect-ratio:16/9;background:#000;margin-bottom:5rem;position:relative;}
.pp-video-full video{width:100%;height:100%;display:block;}

/* 2-COL VIDEO */
.pp-two-videos{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:2rem;}
.pp-video-item{background:var(--bg2);}
.pp-video-item video{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.pp-video-label{font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted2);padding:0.7rem 1rem;}

/* CLIPS GRID */
.pp-clips-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;margin-bottom:5rem;}
.pp-clip-item{background:var(--bg2);overflow:hidden;}
.pp-clip-item video{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.pp-clip-info{padding:1rem 1.2rem;}
.pp-clip-title{font-family:var(--font-display);font-size:1.2rem;letter-spacing:0.05em;color:var(--text);margin-bottom:0.3rem;}
.pp-clip-caption{font-size:0.78rem;color:var(--muted);line-height:1.5;}

/* AI WORKFLOWS */
.pp-ai-workflows{display:flex;flex-direction:column;gap:3.5rem;margin-bottom:5rem;}
.pp-ai-workflow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:1.5rem;
  align-items:center;
}
.pp-ai-step{display:flex;flex-direction:column;gap:0.7rem;}
.pp-ai-step-label{
  font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.22em;
  color:var(--muted);text-transform:uppercase;
}
.pp-ai-step-media{
  width:100%;aspect-ratio:1/1;background:var(--bg2);overflow:hidden;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.25s;
}
.pp-ai-step-media:hover{border-color:var(--accent);}
.pp-ai-step--image .pp-ai-step-media{cursor:zoom-in;}
.pp-ai-step-media img,.pp-ai-step-media video{
  width:100%;height:100%;object-fit:cover;display:block;
}
.pp-ai-arrow{
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  color:var(--accent);min-width:80px;
}
.pp-ai-arrow svg{width:60px;height:30px;}
.pp-ai-arrow-text{
  font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--accent);
}

/* ASSETS — items with titles (video / image) */
.pp-asset-media{width:100%;aspect-ratio:1/1;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.pp-asset-media video,.pp-asset-media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.3s;filter:brightness(0.95);}
.pp-asset-item:hover .pp-asset-media video,
.pp-asset-item:hover .pp-asset-media img{transform:scale(1.04);filter:brightness(1.05);}
.pp-asset-title{
  font-family:var(--font-display);font-size:1rem;letter-spacing:0.06em;
  color:var(--text);padding:0.7rem 1rem 0;
  background:var(--bg2);
}
.pp-asset-item{padding:0;background:var(--bg2);}

/* CV BUTTONS WRAPPER */
.cv-buttons{
  display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
  margin-top:2.5rem;
}
.cv-buttons .cv-download-btn{margin-top:0;}

/* TURNAROUNDS (Character Modeling) */
.pp-turnarounds{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:5rem;}
.pp-turnaround-item{background:var(--bg2);overflow:hidden;}
.pp-turnaround-item video{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}

/* TIMELINE (Sketch to 3D) */
.pp-timeline{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:1.2rem;
  margin-bottom:5rem;
  position:relative;
}
.pp-timeline-step{display:flex;flex-direction:column;gap:0.8rem;position:relative;}
.pp-timeline-marker{
  display:flex;align-items:center;gap:0.6rem;
  font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.2em;color:var(--accent);
}
.pp-timeline-num{
  display:inline-block;padding:0.2rem 0.5rem;
  border:1px solid var(--accent);background:var(--accent-dim);
  font-weight:500;
}
.pp-timeline-line{flex:1;height:1px;background:var(--accent);opacity:0.4;}
.pp-timeline-box{
  width:100%;aspect-ratio:1/1;background:var(--bg2);
  border:1px solid var(--border);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  transition:border-color 0.25s,transform 0.35s;
  position:relative;
  cursor:zoom-in;
}
.pp-timeline-box:hover{border-color:var(--accent);transform:translateY(-3px);}
.pp-timeline-hover{
  position:absolute;inset:0;
  background:linear-gradient(to top, rgba(6,6,6,0.92) 0%, rgba(6,6,6,0.0) 55%);
  display:flex;align-items:flex-end;justify-content:flex-start;
  padding:0.75rem;
  opacity:0;
  transition:opacity 0.25s ease;
  pointer-events:none;
}
.pp-timeline-box:hover .pp-timeline-hover{opacity:1;}
.pp-timeline-hover-text{
  font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.08em;
  color:var(--accent2);text-align:center;line-height:1.5;
  margin:0;
}
.pp-timeline-box img{width:100%;height:100%;object-fit:cover;display:block;}
.pp-timeline-empty{
  font-family:var(--font-display);font-size:3rem;color:rgba(240,51,168,0.12);
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
}
.pp-timeline-label{
  font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.12em;
  color:var(--text);text-transform:uppercase;
  text-align:left;
}

/* SPROUT TOWER LAYOUT */
.pp-sprout-layout{
  display:grid;
  grid-template-columns:1fr 340px;
  gap:2px;
  margin-bottom:5rem;
  align-items:start;
}
.pp-sprout-main{
  cursor:zoom-in;overflow:hidden;
  background:var(--bg2);
  max-height:85vh;
  display:flex;align-items:flex-start;
}
.pp-sprout-main img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
  max-height:85vh;
  transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
}
.pp-sprout-main:hover img{transform:scale(1.02);}
.pp-sprout-process{
  background:var(--bg2);
  overflow:hidden;
  display:flex;align-items:flex-start;
}
.pp-sprout-process img{
  width:100%;height:auto;
  display:block;
  max-height:85vh;
  object-fit:contain;
}
@media(max-width:768px){
  .pp-sprout-layout{grid-template-columns:1fr;}
}

/* FULL IMAGE (Environment) */
.pp-image-full{width:100%;background:var(--bg2);margin-bottom:5rem;cursor:zoom-in;overflow:hidden;}
.pp-image-full img{width:100%;height:auto;display:block;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);}
.pp-image-full:hover img{transform:scale(1.02);}

/* ASSETS GRID */
.pp-assets-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:2px;margin-bottom:5rem;
}
.pp-asset-item{
  background:var(--bg2);overflow:hidden;cursor:zoom-in;
  aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
}
.pp-asset-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.3s;filter:brightness(0.85);}
.pp-asset-item:hover img{transform:scale(1.05);filter:brightness(1.05);}

/* LIGHTBOX */
#lightbox{
  position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.92);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
#lightbox.open{display:flex;}
#lightbox img{max-width:88vw;max-height:88vh;object-fit:contain;}
#lightboxClose{
  position:absolute;top:1.5rem;right:1.5rem;
  background:none;border:1px solid var(--border2);color:var(--muted);
  font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
  padding:0.5rem 1rem;cursor:pointer;transition:all 0.2s;
}
#lightboxClose:hover{color:var(--accent);border-color:var(--accent);}

/* ABOUT */
#about{border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;}
.about-visual{position:relative;}
/* ABOUT SLIDER */
.about-slider{
  position:absolute;inset:0;
  display:flex;
  width:200%;
  transition:transform 0.7s cubic-bezier(0.77,0,0.175,1);
}
.about-slider-img{
  width:50%;height:100%;
  object-fit:cover;
  flex-shrink:0;
}
.about-img-frame{
  width:100%;aspect-ratio:3/4;background:var(--bg2);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:6rem;color:rgba(240,51,168,0.05);
}
.about-img-frame::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,51,168,0.06) 0%,transparent 55%);pointer-events:none;}
.about-accent-box{position:absolute;bottom:-1.5rem;right:-1.5rem;width:55%;height:55%;border:1px solid var(--accent);opacity:0.15;pointer-events:none;}
.about-accent-dot{position:absolute;top:2rem;left:-1rem;width:8px;height:8px;background:var(--accent);border-radius:50%;}
.about-content .s-title{margin-bottom:1.5rem;}
.about-body{font-size:0.95rem;color:var(--muted);line-height:1.85;margin-bottom:1.5rem;}
.skills-cat-label{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.8rem;margin-top:1.8rem;display:flex;align-items:center;gap:0.6rem;}
.skills-cat-label::before{content:'';width:18px;height:1px;background:var(--accent);opacity:0.5;}
.skills-grid{display:flex;flex-wrap:wrap;gap:0.5rem;}
.skill-item{
  display:flex;align-items:center;gap:0.55rem;
  font-size:0.72rem;letter-spacing:0.08em;
  padding:0.45rem 0.9rem;border:1px solid var(--border2);color:var(--muted);
  transition:border-color 0.2s,color 0.2s,background 0.2s;
  font-family:var(--font-mono);
}
.skill-item:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-dim);}
.skill-icon{width:15px;height:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.skill-icon svg{width:15px;height:15px;fill:currentColor;opacity:0.7;}

/* CV BUTTON */
.cv-download-btn{
  display:inline-flex;align-items:center;gap:0.7rem;
  font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--accent);background:transparent;
  border:1px solid var(--accent);
  padding:1rem 2.4rem;text-decoration:none;margin-top:2.5rem;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);
  transition:background 0.25s,color 0.25s,transform 0.25s;
}
.cv-download-btn::before{content:none;}
.cv-download-btn:hover{background:var(--accent);color:var(--bg);transform:translateY(-2px);}

/* CONTACT */
#contact{border-top:1px solid var(--border);text-align:center;padding:9rem 3rem;}
#contact .s-title{font-size:clamp(3rem,8vw,8rem);margin-bottom:1.5rem;}
.contact-sub{font-size:0.95rem;color:var(--muted);margin-bottom:2.5rem;max-width:480px;margin-left:auto;margin-right:auto;}
.contact-email{
  display:inline-block;font-family:var(--font-mono);font-size:clamp(1rem,2.2vw,1.6rem);
  letter-spacing:0.04em;color:var(--text);text-decoration:none;
  border-bottom:1px solid var(--accent);padding-bottom:0.2rem;margin-bottom:3.5rem;
  transition:color 0.2s;
}
.contact-email:hover{color:var(--accent);}
.social-grid{display:flex;justify-content:center;gap:0.4rem;flex-wrap:wrap;}
.social-item{
  font-family:var(--font-mono);font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted2);text-decoration:none;
  padding:0.6rem 1.4rem;border:1px solid var(--border);
  transition:all 0.2s;
}
.social-item:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim);}

/* FOOTER */
footer{
  border-top:1px solid var(--border);padding:1.5rem 3rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
}
footer p{font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.1em;color:var(--muted2);}
.footer-social{display:flex;gap:1.5rem;}
.footer-social a{font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted2);text-decoration:none;transition:color 0.2s;}
.footer-social a:hover{color:var(--accent);}

/* FADE */
.fade-up{opacity:0;transform:translateY(24px);transition:opacity 0.65s ease,transform 0.65s ease;}
.fade-up.visible{opacity:1;transform:translateY(0);}

/* MOBILE */
@media(max-width:900px){
  nav{padding:1rem 1.5rem;}
  .nav-links{display:none;}
  .lang-toggle{border-left:none;padding-left:0;}
  section{padding:5rem 1.5rem;}
  #hero{padding:0 1.5rem 3.5rem;}
  .hero-bottom{flex-direction:column;align-items:flex-start;gap:2rem;}
  .hero-corner{display:none;}
  #about{grid-template-columns:1fr;gap:3rem;}
  .works-grid{grid-template-columns:1fr;}
  .work-item:nth-child(n){grid-column:span 1;}
  .pp-body{padding:3rem 1.5rem;}
  .pp-nav{padding:1rem 1.5rem;}
  .pp-two-videos{grid-template-columns:1fr;}
  .pp-turnarounds{grid-template-columns:1fr;}
  .pp-timeline{grid-template-columns:1fr;gap:2rem;}
  .pp-assets-grid{grid-template-columns:1fr 1fr;}
  .pp-ai-workflow{grid-template-columns:1fr;gap:1rem;}
  .pp-ai-arrow{transform:rotate(90deg);min-width:auto;margin:0.5rem 0;}
  .cv-buttons{flex-direction:column;align-items:stretch;}
  .cursor,.cursor-ring{display:none;}
  footer{flex-direction:column;text-align:center;}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightboxClose" onclick="closeLightbox()">✕ Close</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- MAIN PORTFOLIO PAGE -->
<div id="mainPage">

  <!-- NAV -->
  <nav id="mainNav">
    <a class="nav-logo" href="#hero">
      <span class="nav-logo-dot"><img src="ICON.JPG" alt="Chiara Di Giuseppe"></span>
      CHIARA DI GIUSEPPE
    </a>
    <div class="nav-right">
      <ul class="nav-links" id="navLinks">
        <li><a href="#works"   id="navWorks"></a></li>
        <li><a href="#about"   id="navAbout"></a></li>
        <li><a href="#contact" id="navContact"></a></li>
      </ul>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnEN" onclick="setLang('en')" title="English">EN</button>
        <button class="lang-btn" id="btnIT" onclick="setLang('it')" title="Italiano">IT</button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-noise"></div>
    <div class="hero-lines"></div>
    <canvas id="shapesCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>
    <div style="position:relative;z-index:2;">
      <p class="hero-tag" id="heroTag"></p>
      <h1 class="hero-title">
        <span class="hero-title-accent">CHIARA</span>
        <span class="hero-title-outline">DI GIUSEPPE</span>
      </h1>
    </div>
    <div class="hero-bottom" style="position:relative;z-index:2;">
      <p class="hero-desc" id="heroDesc"></p>
      <a href="#works" class="hero-cta" id="heroCta">
        <span id="heroCtaText"></span>
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5h12M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>
    <div class="scroll-hint"><div class="scroll-line"></div><span>Scroll</span></div>
  </section>

  <!-- WORKS -->
  <section id="works">
    <div class="works-header">
      <div>
        <p class="s-label" id="worksLabel"></p>
        <h2 class="s-title" id="worksTitle" style="margin-bottom:0;"></h2>
      </div>
      <div class="works-filter" id="worksFilter"></div>
    </div>
    <div class="works-grid" id="worksGrid"></div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <div class="about-visual fade-up">
      <div class="about-img-frame" id="aboutFrame">
        <div class="about-slider">
          <img class="about-slider-img" src="about/photo-4.jpg" alt="Chiara Di Giuseppe">
          <img class="about-slider-img" src="about/icon.jpg" alt="Chiara Di Giuseppe">
        </div>
      </div>
      <div class="about-accent-box"></div>
      <div class="about-accent-dot"></div>
    </div>
    <div class="about-content fade-up" style="transition-delay:0.15s">
      <p class="s-label" id="aboutLabel"></p>
      <h2 class="s-title" id="aboutTitle"></h2>
      <p class="about-body" id="aboutBio1"></p>
      <p class="about-body" id="aboutBio2"></p>
      <p class="skills-cat-label" id="skillsLabel3d"></p>
      <div class="skills-grid" id="skillsGrid3d"></div>
      <p class="skills-cat-label" id="skillsLabelAI" style="margin-top:1.5rem;"></p>
      <div class="skills-grid" id="skillsGridAI"></div>
    </div>
  </section>

  <section id="contact" class="fade-up">
    <p class="s-label" id="contactLabel"></p>
    <h2 class="s-title" id="contactTitle"></h2>
    <p class="contact-sub" id="contactSub"></p>
    <a class="contact-email" href="mailto:chiaradigiu2003@gmail.com">chiaradigiu2003@gmail.com</a>
    <br><br>
    <div class="social-grid" id="socialLinks"></div>
    <div class="cv-buttons">
      <a class="cv-download-btn" href="Chiara_Di_Giuseppe_-_Resume_CG.pdf" download id="cvBtnEN"></a>
      <a class="cv-download-btn" href="Chiara_Di_Giuseppe_-_CV_ITA.pdf" download id="cvBtnIT"></a>
    </div>
  </section>

  <footer>
    <p id="footerLeft"></p>
    <p id="footerRight"></p>
  </footer>

</div><!-- end #mainPage -->

<!-- PROJECT PAGE -->
<div id="projectPage">
  <div class="pp-nav">
    <button class="pp-back" id="ppBack" onclick="closePage()">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M13 5H1M6 1L2 5l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="ppBackText"></span>
    </button>
    <span class="pp-title-small" id="ppTitleSmall"></span>
    <div class="lang-toggle" style="border-left:1px solid var(--border);padding-left:1.5rem;">
      <button class="lang-btn" id="ppBtnEN" onclick="setLang('en')" title="English">EN</button>
      <button class="lang-btn" id="ppBtnIT" onclick="setLang('it')" title="Italiano">IT</button>
    </div>
  </div>
  <div class="pp-body" id="ppBody"></div>
</div>

<script>
/* ── LANGUAGE ── */
function setLang(lang) {
  LANG = lang;
  document.documentElement.lang = lang;
  ['btnEN','btnIT','ppBtnEN','ppBtnIT'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.toggle('active', (id.includes('EN') ? 'en' : 'it') === lang);
  });
  renderAll();
  // Re-render project page if open

/* ── WORKS ── */
function renderWorks(){
  const L = CONFIG.i18n[LANG];
  const grid = document.getElementById('worksGrid');
  const placeholders = ['POP','REEL','◇','✦','▣','◈','AI'];
  grid.innerHTML = CONFIG.projects.map((p,i)=>{
    const cover = p.cover || '';
    const thumb = cover
      ? `<img class="work-thumb" src="${cover}" alt="${p.title}">`
      : `<div class="work-placeholder"><div class="work-placeholder-inner">${placeholders[i]||'◈'}</div></div>`;
    const badge = p.isThesis ? `<div class="work-badge" data-key="graduationBadge">${L.graduationBadge}</div>` : '';
    const catLabel = L.catLabels[p.category]||p.category;
    return `<div class="work-item fade-up" data-cat="${p.category}" data-id="${p.id}" style="transition-delay:${i*0.12}s" onclick="openPage('${p.id}')">
      ${badge}${thumb}
      <div class="work-overlay">
        <p class="work-cat">${catLabel}</p>
        <p class="work-name">${p.title}</p>
        <p class="work-desc">${p.description[LANG]}</p>
        <div class="work-arrow">→</div>
      </div>
    </div>`;
  }).join('');

  // Filter
  const cats = ['all',...new Set(CONFIG.projects.map(p=>p.category))];
  const fd = document.getElementById('worksFilter');
  fd.innerHTML='';
  cats.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(c==='all'?' active':'');
    btn.textContent=c==='all'?L.filterAll:(L.catLabels[c]||c);
    btn.onclick=()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.work-item').forEach(item=>{
        item.style.display=(c==='all'||item.dataset.cat===c)?'':'none';
      });
    };
    fd.appendChild(btn);
  });
}

/* ── PROJECT PAGE ── */
let currentProject = null;

function openPage(id){
  currentProject = CONFIG.projects.find(p=>p.id===id);
  if(!currentProject) return;
  renderProjectPage(currentProject);
  const pp = document.getElementById('projectPage');
  pp.style.display='block';
  pp.scrollTop=0;
  requestAnimationFrame(()=>{ pp.classList.add('visible'); });
  document.body.style.overflow='hidden';
  setTimeout(()=>{ document.body.style.overflow=''; pp.style.overflow='auto'; },50);
  // Push state so browser back button works
  history.pushState({ projectId: id }, '', '#' + id);
}

function closePage(){
  const pp=document.getElementById('projectPage');
  pp.classList.remove('visible');
  setTimeout(()=>{ pp.style.display='none'; currentProject=null; },400);
  document.body.style.overflow='';
  // Pause any playing videos
  document.querySelectorAll('#projectPage video').forEach(v=>v.pause());
}

// Handle browser back/forward buttons
window.addEventListener('popstate', function(e){
  if(e.state && e.state.projectId){
    // Going forward to a project
    openPageSilent(e.state.projectId);
  } else {
    // Going back to portfolio
    const pp=document.getElementById('projectPage');
    if(pp.classList.contains('visible')){
      pp.classList.remove('visible');
      setTimeout(()=>{ pp.style.display='none'; currentProject=null; },400);
      document.body.style.overflow='';
      document.querySelectorAll('#projectPage video').forEach(v=>v.pause());
    }
  }
});

// Open page without pushing state (used by popstate handler)
function openPageSilent(id){
  currentProject = CONFIG.projects.find(p=>p.id===id);
  if(!currentProject) return;
  renderProjectPage(currentProject);
  const pp = document.getElementById('projectPage');
  pp.style.display='block';
  pp.scrollTop=0;
  requestAnimationFrame(()=>{ pp.classList.add('visible'); });
  document.body.style.overflow='hidden';
  setTimeout(()=>{ document.body.style.overflow=''; pp.style.overflow='auto'; },50);
}

// Handle direct URL with hash on page load
window.addEventListener('DOMContentLoaded', ()=>{
  const hash = window.location.hash.replace('#','');
  if(hash && CONFIG.projects.find(p=>p.id===hash)){
    setTimeout(()=>openPageSilent(hash), 300);

});

/* ── LAZY VIDEO PLAY ── */
let _lazyVideoObs = null;
function setupLazyVideos(){
  // Disconnect old observer (in case of language re-render)
  if(_lazyVideoObs) _lazyVideoObs.disconnect();
  _lazyVideoObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const v = e.target;
      if(e.isIntersecting){
        // Upgrade preload to auto so the actual stream loads, then play
        if(v.preload !== 'auto') v.preload = 'auto';
        const p = v.play();
        if(p && p.catch) p.catch(()=>{});
      } else {
        v.pause();
      }
    });
  },{ threshold: 0.25 });
  document.querySelectorAll('video[data-lazy-play]').forEach(v=>_lazyVideoObs.observe(v));
}

/* ── FLOATING SHAPES ── */
(function(){
  const canvas = document.getElementById('shapesCanvas');
  const ctx = canvas.getContext('2d');
  const ACCENT  = 'rgba(240,51,168,';
  const ACCENT2 = 'rgba(255,111,209,';

  function resize(){
    canvas.width  = canvas.offsetWidth  * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resize();
  window.addEventListener('resize', resize);

  // Shape drawers
  const drawers = [
    // 4-point star
    (cx,cy,s,a,op)=>{
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.globalAlpha=op;
      ctx.fillStyle=ACCENT+'0.9)';
      ctx.beginPath();
      for(let i=0;i<8;i++){
        const r=i%2===0?s:s*0.4;
        const ang=i*Math.PI/4;
        i===0?ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
      }
      ctx.closePath();ctx.fill();ctx.restore();
    },
    // hollow diamond
    (cx,cy,s,a,op)=>{
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.globalAlpha=op;
      ctx.strokeStyle=ACCENT+'0.9)';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(0,-s);ctx.lineTo(s,0);ctx.lineTo(0,s);ctx.lineTo(-s,0);
      ctx.closePath();ctx.stroke();ctx.restore();
    },
    // small circle
    (cx,cy,s,a,op)=>{
      ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=op;
      ctx.fillStyle=ACCENT2+'0.7)';
      ctx.beginPath();ctx.arc(0,0,s*0.45,0,Math.PI*2);ctx.fill();ctx.restore();
    },
    // cross / plus
    (cx,cy,s,a,op)=>{
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.globalAlpha=op;
      ctx.strokeStyle=ACCENT+'0.8)';ctx.lineWidth=1.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-s,0);ctx.lineTo(s,0);ctx.moveTo(0,-s);ctx.lineTo(0,s);
      ctx.stroke();ctx.restore();
    },
    // triangle outline
    (cx,cy,s,a,op)=>{
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.globalAlpha=op;
      ctx.strokeStyle=ACCENT2+'0.7)';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(0,-s);ctx.lineTo(s*0.87,s*0.5);ctx.lineTo(-s*0.87,s*0.5);
      ctx.closePath();ctx.stroke();ctx.restore();
    },
    // sparkle (×)
    (cx,cy,s,a,op)=>{
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a+Math.PI/4);ctx.globalAlpha=op;
      ctx.strokeStyle=ACCENT+'0.9)';ctx.lineWidth=1.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-s,0);ctx.lineTo(s,0);ctx.moveTo(0,-s);ctx.lineTo(0,s);
      ctx.stroke();ctx.restore();
    },
  ];

  // Create particles
  const W = ()=> canvas.offsetWidth;
  const H = ()=> canvas.offsetHeight;
  const COUNT = 28;
  const particles = Array.from({length:COUNT},(_,i)=>({
    x: Math.random()*W(),
    y: Math.random()*H(),
    vx: (Math.random()-0.5)*0.3,
    vy: (Math.random()-0.5)*0.3 - 0.1,
    size: 5 + Math.random()*10,
    angle: Math.random()*Math.PI*2,
    va: (Math.random()-0.5)*0.01,
    opacity: 0.15 + Math.random()*0.45,
    type: i % drawers.length,
    phase: Math.random()*Math.PI*2,
  }));

  let mouse = {x: W()/2, y: H()/2};
  document.getElementById('hero').addEventListener('mousemove', e=>{
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });

  function tick(){
    ctx.clearRect(0,0,W(),H());
    const t = Date.now()*0.001;

    particles.forEach(p=>{
      // gentle float + sine wave
      p.x += p.vx + Math.sin(t*0.5+p.phase)*0.15;
      p.y += p.vy + Math.cos(t*0.4+p.phase)*0.1;
      p.angle += p.va;

      // subtle mouse attraction
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 180){ p.x += dx*0.0015; p.y += dy*0.0015; }

      // wrap around edges
      if(p.x < -20) p.x = W()+20;
      if(p.x > W()+20) p.x = -20;
      if(p.y < -20) p.y = H()+20;
      if(p.y > H()+20) p.y = -20;

      drawers[p.type](p.x, p.y, p.size, p.angle, p.opacity);
    });

    requestAnimationFrame(tick);
  }
  tick();
})();

/* ── INIT ── */
renderAll();
</script>
